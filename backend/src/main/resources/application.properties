spring.application.name=itr-filing-assistant

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/itr_db
spring.datasource.username=itr_user
spring.datasource.password=itr_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJWTthatIsAtLeast256BitsLongForHS256Algorithm2026}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# CORS
app.cors.allowed-origins=http://localhost:3000

# Server
server.port=8080
