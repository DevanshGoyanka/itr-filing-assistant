version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: itr_db
      POSTGRES_USER: itr_user
      POSTGRES_PASSWORD: itr_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U itr_user -d itr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/itr_db
      SPRING_DATASOURCE_USERNAME: itr_user
      SPRING_DATASOURCE_PASSWORD: itr_pass
      JWT_SECRET: ${JWT_SECRET:-mySuperSecretKeyForJWTthatIsAtLeast256BitsLongForHS256Algorithm2026}
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
